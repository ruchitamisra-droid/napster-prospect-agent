<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Napster · Prospect Research Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --text2: #888;
      --text3: #555;
      --accent: #c8f135;
      --accent-dim: rgba(200,241,53,0.12);
      --accent-text: #8ab020;
      --info: rgba(100,160,255,0.12);
      --info-text: #7ab0ff;
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      padding: 1.25rem 2rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .header-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      border: 0.5px solid var(--border2);
      color: var(--text2);
    }

    /* MAIN */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .hero {
      margin-bottom: 2.5rem;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .hero h1 span { color: var(--accent); }

    .hero p {
      font-size: 15px;
      color: var(--text2);
      line-height: 1.6;
    }

    /* API KEY INPUT */
    .api-section {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .api-section label {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
    }

    .api-section input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 13px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    .api-section input::placeholder { color: var(--text3); }

    /* INPUT ROW */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .input-row input[type="text"] {
      flex: 1;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 1rem;
      height: 44px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .input-row input[type="text"]:focus { border-color: var(--border2); }
    .input-row input[type="text"]::placeholder { color: var(--text3); }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0 1.25rem;
      height: 44px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--text2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 1rem;
      height: 36px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .btn-secondary:hover { background: var(--bg3); color: var(--text); }

    /* QUICK FILLS */
    .quick-fills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .quick-fill {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 99px;
      border: 0.5px solid var(--border);
      color: var(--text2);
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .quick-fill:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }

    /* STATUS */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 1rem;
      min-height: 20px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* BRIEF CARD */
    .brief-card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brief-top {
      padding: 1.25rem;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .brief-company { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
    .brief-meta { font-size: 13px; color: var(--text2); margin-top: 3px; }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--accent-dim);
      color: var(--accent);
      white-space: nowrap;
      border: 0.5px solid rgba(200,241,53,0.2);
    }

    .brief-body {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .section-content {
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 99px;
      background: var(--bg3);
      color: var(--text2);
      border: 0.5px solid var(--border);
    }

    .pill-accent {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(200,241,53,0.2);
    }

    .hook-box {
      background: var(--info);
      border-radius: var(--radius-sm);
      padding: 0.875rem 1rem;
      border-left: 2px solid rgba(100,160,255,0.4);
    }

    .hook-box .section-label { color: var(--info-text); opacity: 0.7; }

    .hook-text {
      font-size: 14px;
      color: var(--info-text);
      font-style: italic;
      line-height: 1.6;
    }

    .objection-item {
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 0.875rem 1rem;
      margin-bottom: 8px;
      border: 0.5px solid var(--border);
    }

    .objection-q { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .objection-a { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .objection-a::before { content: '→ '; color: var(--accent); }

    .brief-footer {
      padding: 1rem 1.25rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .error-box {
      background: rgba(255,80,80,0.08);
      border: 0.5px solid rgba(255,80,80,0.2);
      border-radius: var(--radius-sm);
      padding: 0.875rem 1rem;
      font-size: 13px;
      color: #ff8080;
    }

    /* FOOTER */
    footer {
      padding: 1.25rem 2rem;
      border-top: 0.5px solid var(--border);
      font-size: 12px;
      color: var(--text3);
      text-align: center;
    }

    /* COPIED TOAST */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #0a0a0a;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 99px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      main { padding: 2rem 1rem; }
      .hero h1 { font-size: 22px; }
      .input-row { flex-direction: column; }
      .btn-primary { width: 100%; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet" />
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Napster · Prospect Agent
  </div>
  <span class="header-badge">Internal tool · VP Partnerships</span>
</header>

<main>
  <div class="hero">
    <h1>Find the <span>right angle</span><br>for every prospect.</h1>
    <p>Enter a telco or media company — get a tailored Napster partnership brief in seconds, powered by AI.</p>
  </div>

  <div class="api-section">
    <label>Anthropic API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
  </div>

  <div class="input-row">
    <input type="text" id="company-input" placeholder="e.g. Vodafone, Safaricom, Orange, Airtel..." />
    <button class="btn-primary" id="run-btn" onclick="runAgent()">Generate brief</button>
  </div>

  <div class="quick-fills">
    <span style="font-size:12px;color:var(--text3);align-self:center;margin-right:4px;">Try:</span>
    <button class="quick-fill" onclick="quickFill('Vodafone')">Vodafone</button>
    <button class="quick-fill" onclick="quickFill('Orange')">Orange</button>
    <button class="quick-fill" onclick="quickFill('Airtel Africa')">Airtel Africa</button>
    <button class="quick-fill" onclick="quickFill('Safaricom')">Safaricom</button>
    <button class="quick-fill" onclick="quickFill('Etisalat')">Etisalat</button>
    <button class="quick-fill" onclick="quickFill('Viu')">Viu</button>
    <button class="quick-fill" onclick="quickFill('DSTV')">DSTV</button>
  </div>

  <div class="status-bar" id="status-bar"></div>
  <div id="output-area"></div>
</main>

<footer>Built with Claude AI · Napster Partnerships · Not for distribution</footer>

<div class="toast" id="toast">Copied to clipboard</div>

<script>
  function quickFill(name) {
    document.getElementById('company-input').value = name;
    document.getElementById('company-input').focus();
  }

  document.getElementById('company-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') runAgent();
  });

  async function runAgent() {
    const company = document.getElementById('company-input').value.trim();
    const apiKey = document.getElementById('api-key').value.trim();

    if (!company) {
      document.getElementById('company-input').focus();
      return;
    }
    if (!apiKey) {
      document.getElementById('api-key').focus();
      showError('Please enter your Anthropic API key above.');
      return;
    }

    const btn = document.getElementById('run-btn');
    const statusBar = document.getElementById('status-bar');
    const outputArea = document.getElementById('output-area');

    btn.disabled = true;
    outputArea.innerHTML = '';
    statusBar.innerHTML = '<div class="spinner"></div><span>Researching ' + company + '...</span>';

    const systemPrompt = `You are an elite B2B partnership intelligence agent for Napster — the AI multimodal platform featuring thousands of AI specialist companions for music, wellness, education, and business coaching, distributed via telcos.

Napster's key products:
- Napster App: AI companions (face-to-face video), music creation, personalized media feed, freemium + subscription ($2-$20/mo)
- Napster Studios: AI-generated interactive content (reality shows, telenovelas) built for telco audiences  
- Napster Pocket: AI-powered handheld device bundled with telco plans
- Partnership model: Joint ventures — telco brings local distribution, sponsorships, market expertise; Napster brings AI content tech, music/media IP, platform

Generate a sharp B2B deal brief a VP of Partnerships would use before a first meeting.

Respond ONLY with a valid JSON object. No markdown, no backticks, no explanation. Structure exactly:
{
  "company": "Full company name",
  "hq": "City, Country",
  "sector": "Telco / Media / Tech",
  "subscribers": "Estimated subscriber base or reach",
  "why_now": "2-3 sentences on why this company is primed for an AI media partnership right now",
  "pain_points": ["pain point 1", "pain point 2", "pain point 3"],
  "napster_fit": "2-3 sentences on which Napster products fit best and why",
  "products_to_lead_with": ["Product 1", "Product 2"],
  "opening_hook": "One punchy opening line to use in a cold email or intro meeting",
  "objections": [
    {"objection": "Likely objection 1", "counter": "How to handle it"},
    {"objection": "Likely objection 2", "counter": "How to handle it"}
  ],
  "deal_structure": "Suggested partnership model — JV, revenue share, white-label, etc."
}`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: 'Generate a partnership brief for: ' + company }]
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error ' + response.status);
      }

      const data = await response.json();
      const text = data.content?.find(b => b.type === 'text')?.text || '';
      let brief;
      try {
        brief = JSON.parse(text.replace(/```json|```/g, '').trim());
      } catch(e) {
        throw new Error('Could not parse response — try again');
      }

      statusBar.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0"><circle cx="7" cy="7" r="7" fill="rgba(200,241,53,0.2)"/><path d="M4 7l2 2 4-4" stroke="#c8f135" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="color:#888">Brief ready · ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + '</span>';

      window._lastBrief = brief;

      outputArea.innerHTML = `
        <div class="brief-card">
          <div class="brief-top">
            <div>
              <div class="brief-company">${esc(brief.company)}</div>
              <div class="brief-meta">${esc(brief.hq)} &nbsp;·&nbsp; ${esc(brief.sector)} &nbsp;·&nbsp; ${esc(brief.subscribers)}</div>
            </div>
            <span class="badge">Deal brief</span>
          </div>
          <div class="brief-body">
            <div>
              <div class="section-label">Why now</div>
              <div class="section-content">${esc(brief.why_now)}</div>
            </div>
            <div>
              <div class="section-label">Their pain points</div>
              <div class="pills">${brief.pain_points.map(p => `<span class="pill">${esc(p)}</span>`).join('')}</div>
            </div>
            <div>
              <div class="section-label">Napster fit</div>
              <div class="section-content">${esc(brief.napster_fit)}</div>
            </div>
            <div>
              <div class="section-label">Lead with these products</div>
              <div class="pills">${brief.products_to_lead_with.map(p => `<span class="pill pill-accent">${esc(p)}</span>`).join('')}</div>
            </div>
            <div class="hook-box">
              <div class="section-label">Opening hook</div>
              <div class="hook-text">"${esc(brief.opening_hook)}"</div>
            </div>
            <div>
              <div class="section-label">Objection handling</div>
              ${brief.objections.map(o => `
                <div class="objection-item">
                  <div class="objection-q">${esc(o.objection)}</div>
                  <div class="objection-a">${esc(o.counter)}</div>
                </div>`).join('')}
            </div>
            <div>
              <div class="section-label">Suggested deal structure</div>
              <div class="section-content">${esc(brief.deal_structure)}</div>
            </div>
          </div>
          <div class="brief-footer">
            <button class="btn-secondary" onclick="copyBrief()">Copy brief</button>
            <button class="btn-secondary" onclick="document.getElementById('company-input').value='';document.getElementById('company-input').focus();document.getElementById('output-area').innerHTML='';document.getElementById('status-bar').innerHTML=''">New prospect</button>
          </div>
        </div>`;

    } catch(err) {
      statusBar.innerHTML = '';
      showError(err.message);
    }

    btn.disabled = false;
  }

  function showError(msg) {
    document.getElementById('output-area').innerHTML = `<div class="error-box">${esc(msg)}</div>`;
  }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function copyBrief() {
    const b = window._lastBrief;
    if (!b) return;
    const text = [
      `NAPSTER PARTNERSHIP BRIEF — ${b.company}`,
      `HQ: ${b.hq}  |  Sector: ${b.sector}  |  Reach: ${b.subscribers}`,
      ``,
      `WHY NOW`,
      b.why_now,
      ``,
      `PAIN POINTS`,
      b.pain_points.map(p => '• ' + p).join('\n'),
      ``,
      `NAPSTER FIT`,
      b.napster_fit,
      ``,
      `LEAD WITH: ${b.products_to_lead_with.join(', ')}`,
      ``,
      `OPENING HOOK`,
      `"${b.opening_hook}"`,
      ``,
      `OBJECTION HANDLING`,
      b.objections.map(o => `• ${o.objection}\n  → ${o.counter}`).join('\n'),
      ``,
      `DEAL STRUCTURE`,
      b.deal_structure,
    ].join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  }
</script>

</body>
</html>
